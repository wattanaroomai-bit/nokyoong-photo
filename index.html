<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Photo Booth A6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- เพิ่มฟอนต์ Kanit สำหรับข้อความบนรูปภาพ -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* สไตล์สำหรับการปริ้นขนาด A6 */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                position: absolute; 
                left: 0; top: 0; 
                width: 100vw; height: 100vh;
                display: flex; justify-content: center; align-items: center;
            }
            #print-area img { width: 100%; height: auto; max-height: 100%; object-fit: contain; }
            @page { size: A4; margin: 0; } /* เครื่องปริ้นส่วนใหญ่ใช้กระดาษ A4 หรือเซ็ตใน driver เป็น A6 */
        }
        
        .countdown-text {
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen w-screen overflow-hidden">

    <!-- หน้าเลือกโหมดการทำงาน -->
    <div id="mode-selection" class="flex flex-col items-center justify-center h-full space-y-6">
        <h1 class="text-4xl font-bold text-gray-800 mb-8"><i class="fas fa-camera-retro mr-3"></i>Photo Booth System</h1>
        <div class="flex space-x-6">
            <button onclick="startMode('capture')" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-12 rounded-2xl shadow-lg text-2xl font-bold flex flex-col items-center transition transform hover:scale-105">
                <i class="fas fa-camera text-5xl mb-4"></i>
                เครื่องถ่ายรูป
            </button>
            <button onclick="startMode('gallery')" class="bg-green-600 hover:bg-green-700 text-white px-8 py-12 rounded-2xl shadow-lg text-2xl font-bold flex flex-col items-center transition transform hover:scale-105">
                <i class="fas fa-print text-5xl mb-4"></i>
                เครื่องปริ้น/แกลลอรี่
            </button>
        </div>
    </div>

    <!-- โหมดถ่ายรูป -->
    <div id="capture-mode" class="hidden h-full flex flex-col md:flex-row">
        <!-- ฝั่งควบคุมกล้องและฟิลเตอร์ -->
        <div class="w-full md:w-2/3 h-full bg-black relative flex flex-col justify-center items-center">
            
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
            
            <!-- ตัวเลขนับถอยหลัง -->
            <div id="countdown" class="hidden absolute inset-0 flex items-center justify-center text-white text-9xl font-bold countdown-text z-50">3</div>
            
            <!-- แผงควบคุมฟิลเตอร์แบบใหม่ (ทันสมัยขึ้น) -->
            <div class="absolute bottom-8 w-full px-4 md:px-12 flex flex-col items-center space-y-4">
                
                <!-- ปุ่มเปิด/ปิดการตั้งค่า (ชิดขวา) -->
                <div class="w-full flex justify-end max-w-2xl">
                    <button onclick="toggleSettings()" class="bg-white/20 hover:bg-white/30 backdrop-blur-md text-white px-5 py-2 rounded-full transition shadow-lg border border-white/20 flex items-center space-x-2" title="ซ่อน/แสดงการตั้งค่า">
                        <i class="fas fa-sliders-h"></i> <span id="toggle-setting-text">ตั้งค่าฟิลเตอร์</span>
                    </button>
                </div>

                <!-- แผงตั้งค่าฟิลเตอร์ (ซ่อน/แสดงได้) -->
                <div id="settings-panel" class="hidden flex-col items-center space-y-4 bg-black/40 backdrop-blur-md p-5 rounded-3xl border border-white/20 max-w-2xl w-full transition-all duration-300">
                    <div class="flex flex-wrap justify-center gap-2 w-full">
                        <button onclick="setFilter('normal')" id="btn-normal" class="filter-btn px-5 py-2 rounded-full bg-blue-500 text-white font-semibold shadow-md transition">ปกติ</button>
                        <button onclick="setFilter('pink')" id="btn-pink" class="filter-btn px-5 py-2 rounded-full bg-white/20 text-white font-semibold hover:bg-white/30 transition">ผิวกระจ่างชมพู</button>
                        <button onclick="setFilter('bw')" id="btn-bw" class="filter-btn px-5 py-2 rounded-full bg-white/20 text-white font-semibold hover:bg-white/30 transition">ขาวดำ</button>
                        <button onclick="setFilter('vivid')" id="btn-vivid" class="filter-btn px-5 py-2 rounded-full bg-white/20 text-white font-semibold hover:bg-white/30 transition">สีสดใส</button>
                    </div>

                    <div class="flex items-center space-x-4 w-full md:w-3/4 bg-white/10 p-3 rounded-2xl text-white">
                        <i class="fas fa-adjust text-gray-300"></i>
                        <input type="range" id="filter-intensity" min="-100" max="100" value="0" class="w-full accent-blue-500" oninput="applyFilterToVideo()">
                        <span id="intensity-val" class="font-mono text-sm w-16 text-right">0%</span>
                    </div>
                </div>

                <!-- ปุ่มถ่ายรูป (แบบกดทีละช็อต) -->
                <button id="start-btn" onclick="takeSingleShot()" class="bg-white text-black text-xl font-bold py-4 px-8 rounded-full shadow-[0_10px_30px_rgba(255,255,255,0.3)] hover:scale-105 active:scale-95 transition transform flex items-center group">
                    <div class="w-8 h-8 rounded-full border-4 border-gray-800 mr-3 group-hover:bg-gray-200 transition"></div> 
                    <span id="shutter-text">ถ่ายรูป (1/3)</span>
                </button>

                <!-- ปุ่มแอคชั่นหลังถ่ายเสร็จ (แทนที่ปุ่มถ่ายเมื่อครบ 3 รูป) -->
                <div id="action-buttons" class="hidden flex-col items-center space-y-3 w-full max-w-sm">
                    <button onclick="uploadImage()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-6 rounded-full shadow-[0_10px_30px_rgba(34,197,94,0.4)] hover:scale-105 active:scale-95 transition transform text-xl flex items-center justify-center">
                        <i class="fas fa-paper-plane mr-2"></i> ส่งรูปเข้าแกลลอรี่
                    </button>
                    <button onclick="resetCapture()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:scale-105 active:scale-95 transition transform flex items-center justify-center">
                        <i class="fas fa-redo mr-2"></i> ถ่ายใหม่
                    </button>
                </div>
            </div>
        </div>

        <!-- ฝั่งแสดงผล A6 Preview -->
        <div class="w-full md:w-1/3 bg-gray-200 h-full p-4 flex flex-col items-center border-l border-gray-300">
            <h2 class="text-xl font-bold mb-4">พรีวิวรูปภาพ (A6)</h2>
            <!-- สัดส่วน A6 (105x148) -->
            <div class="bg-white shadow-xl relative" style="width: 250px; height: 352px;">
                <canvas id="result-canvas" width="1200" height="1800" class="w-full h-full object-contain"></canvas>
            </div>
            
            <p id="upload-status" class="mt-6 text-lg font-semibold text-center"></p>
        </div>
    </div>

    <!-- โหมดแกลลอรี่ / ปริ้น -->
    <div id="gallery-mode" class="hidden h-full flex flex-col">
        <div class="bg-white shadow p-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fas fa-images mr-2 text-green-600"></i> รอรับรูป / แกลลอรี่</h1>
            <button onclick="loadGallery()" class="bg-blue-100 text-blue-700 px-4 py-2 rounded hover:bg-blue-200">
                <i class="fas fa-sync-alt mr-1"></i> รีเฟรช
            </button>
        </div>
        
        <div class="flex-1 overflow-auto p-6">
            <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <!-- รูปจะถูกเพิ่มที่นี่ -->
            </div>
        </div>
    </div>

    <!-- พื้นที่สำหรับปริ้น -->
    <div id="print-area" class="hidden">
        <img id="print-image" src="" alt="print">
    </div>

    <script>
        // 🚨 อัปเดตลิงก์ Apps Script ของคุณเรียบร้อยแล้ว 🚨
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_Uv9NisjrB-XF-R8NhMSXP3M_F9jevyaOFATFbfF72Ba8CwCQ7tO7hPAbAMQzgaxA/exec';

        // --- ตัวแปรจัดการสถานะ ---
        let currentFilter = 'normal';
        let capturedImages = [];
        let videoStream = null;
        let currentShotIndex = 0;
        const maxShots = 3;
        
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('result-canvas');
        const ctx = canvas.getContext('2d');
        const filterSlider = document.getElementById('filter-intensity');

        // --- ระบบสลับหน้าจอ ---
        function startMode(mode) {
            document.getElementById('mode-selection').classList.add('hidden');
            if (mode === 'capture') {
                document.getElementById('capture-mode').classList.remove('hidden');
                initCamera();
            } else {
                document.getElementById('gallery-mode').classList.remove('hidden');
                loadGallery();
                // ตั้งรีเฟรชอัตโนมัติทุก 10 วินาทีสำหรับเครื่องปริ้น
                setInterval(loadGallery, 10000);
            }
        }

        // --- ระบบกล้อง ---
        async function initCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = videoStream;
                // วาดพื้นหลังกระดาษ A6 สีขาวรอไว้
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } catch (err) {
                alert("ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตให้ใช้งานกล้อง");
                console.error(err);
            }
        }

        // --- ระบบฟิลเตอร์ ---
        function setFilter(filterType) {
            currentFilter = filterType;
            // อัปเดต UI ปุ่มแบบใหม่
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-500');
                btn.classList.add('bg-white/20');
            });
            document.getElementById('btn-' + filterType).classList.remove('bg-white/20');
            document.getElementById('btn-' + filterType).classList.add('bg-blue-500');
            
            // รีเซ็ตค่าหลอดพลังเมื่อกดเปลี่ยนฟิลเตอร์
            if (filterType === 'normal') {
                filterSlider.value = 0;   // ปกติ เริ่มที่ 0 (ต้นฉบับ)
            } else if (filterType === 'bw') {
                filterSlider.value = 100; // ขาวดำ เริ่มที่ 100% 
            } else {
                filterSlider.value = 50;  // สีอื่นๆ เริ่มที่ +50%
            }

            applyFilterToVideo();
        }

        function getCSSFilterString(intensity) {
            // ปรับให้รองรับค่าติดลบ (intensity จาก -100 ถึง 100 กลายเป็น -1.0 ถึง 1.0)
            const val = intensity / 100; 
            switch(currentFilter) {
                case 'pink': 
                    return `contrast(${1 + val*0.15}) brightness(${1 + val*0.1}) saturate(${1 + val*0.3}) sepia(${Math.max(0, val*0.15)}) hue-rotate(${val * -15}deg)`;
                case 'bw': 
                    return `grayscale(${Math.max(0, val * 100)}%) contrast(${1 + val*0.2}) saturate(${1 + val*0.5})`;
                case 'vivid': 
                    return `saturate(${100 + val*80}%) contrast(${1 + val*0.15})`;
                case 'normal':
                    return `contrast(${1 + val*0.15}) brightness(${1 + val*0.1}) saturate(${1 + val*0.3})`;
                default: 
                    return 'none';
            }
        }

        function applyFilterToVideo() {
            const intensity = filterSlider.value;
            // ใส่เครื่องหมาย + นำหน้าถ้าเป็นค่าบวก ให้ดูเข้าใจง่ายขึ้น
            const displayVal = intensity > 0 ? '+' + intensity : intensity;
            document.getElementById('intensity-val').innerText = displayVal + '%';
            video.style.filter = getCSSFilterString(intensity);
        }

        // --- ระบบถ่ายรูปและนับถอยหลัง (อัปเดตใหม่) ---
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            const isHidden = panel.classList.contains('hidden');
            
            if (isHidden) {
                panel.classList.remove('hidden');
                panel.classList.add('flex');
                document.getElementById('toggle-setting-text').innerText = "ซ่อนการตั้งค่า";
            } else {
                panel.classList.add('hidden');
                panel.classList.remove('flex');
                document.getElementById('toggle-setting-text').innerText = "ตั้งค่าฟิลเตอร์";
            }
        }

        async function takeSingleShot() {
            if (currentShotIndex >= maxShots) return;

            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = true;
            startBtn.classList.add('opacity-70', 'cursor-not-allowed');
            
            // ซ่อนแผงตั้งค่าอัตโนมัติตอนกำลังถ่าย
            document.getElementById('settings-panel').classList.add('hidden');
            document.getElementById('settings-panel').classList.remove('flex');

            await runCountdown();
            captureFrame(currentShotIndex);
            
            currentShotIndex++;

            if (currentShotIndex < maxShots) {
                // อัปเดตข้อความสำหรับรูปต่อไป
                document.getElementById('shutter-text').innerText = `ถ่ายรูป (${currentShotIndex + 1}/${maxShots})`;
                startBtn.disabled = false;
                startBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            } else {
                // ถ่ายครบแล้ว วาดข้อความส่วนท้าย และแสดงปุ่มอัปโหลด
                drawFooterText();
                startBtn.classList.add('hidden');
                document.getElementById('action-buttons').classList.remove('hidden');
                document.getElementById('action-buttons').classList.add('flex');
            }
        }

        function runCountdown() {
            return new Promise(resolve => {
                let count = 3;
                const countdownEl = document.getElementById('countdown');
                countdownEl.classList.remove('hidden');
                countdownEl.innerText = count;

                const timer = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownEl.innerText = count;
                    } else if (count === 0) {
                        countdownEl.innerText = "แชะ!";
                    } else {
                        clearInterval(timer);
                        countdownEl.classList.add('hidden');
                        resolve();
                    }
                }, 1000);
            });
        }

        function captureFrame(index) {
            // สร้าง Canvas ชั่วคราวเพื่อแคปเจอร์พร้อมฟิลเตอร์
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tCtx = tempCanvas.getContext('2d');
            
            // ใส่ฟิลเตอร์ลงใน Context ก่อนวาด
            tCtx.filter = getCSSFilterString(filterSlider.value);
            
            // กลับด้านภาพ (Mirror) ให้เหมือนที่เห็นในจอ
            tCtx.translate(tempCanvas.width, 0);
            tCtx.scale(-1, 1);
            tCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            
            // --- การจัดเรียงเลย์เอาต์ใหม่ เพื่อเว้นที่ด้านล่างให้ข้อความ ---
            const topMargin = 80;
            const bottomFooter = 250; // พื้นที่สำหรับข้อความด้านล่าง
            const gap = 40; // ช่องว่างระหว่างรูป
            
            // คำนวณความสูงของรูปแต่ละใบให้พอดีกับพื้นที่
            const availableHeight = canvas.height - topMargin - bottomFooter;
            const photoHeight = (availableHeight - (gap * 2)) / 3;
            
            // คำนวณความกว้างตามสัดส่วนของกล้อง (รักษาสัดส่วนเดิมไว้)
            const videoAspect = video.videoWidth / video.videoHeight;
            const photoWidth = photoHeight * videoAspect;
            
            // จัดให้อยู่กึ่งกลางหน้ากระดาษแนวนอน
            const x = (canvas.width - photoWidth) / 2;
            const y = topMargin + (index * (photoHeight + gap));

            ctx.drawImage(tempCanvas, x, y, photoWidth, photoHeight);
            
            // วาดกรอบรูป
            ctx.strokeStyle = "#e5e7eb";
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, photoWidth, photoHeight);
        }

        function drawFooterText() {
            ctx.fillStyle = "black";
            ctx.textAlign = "center";
            
            // บรรทัดแรก: NOKYOONG PHOTO
            ctx.font = "bold 60px 'Kanit', sans-serif";
            ctx.fillText("NOKYOONG PHOTO", canvas.width / 2, canvas.height - 130);
            
            // บรรทัดที่สอง: ครูหนึ่ง + วันที่/เวลา
            ctx.font = "35px 'Kanit', sans-serif";
            const now = new Date();
            // จัดรูปแบบวันที่ เช่น 20 มี.ค. 2569
            const dateStr = now.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
            // จัดรูปแบบเวลา เช่น 18:00
            const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            
            ctx.fillText("ครูหนึ่ง | " + dateStr + " " + timeStr, canvas.width / 2, canvas.height - 70);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function resetCapture() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // รีเซ็ตสถานะปุ่มและการนับ
            document.getElementById('action-buttons').classList.add('hidden');
            document.getElementById('action-buttons').classList.remove('flex');
            document.getElementById('upload-status').innerText = "";
            
            currentShotIndex = 0;
            const startBtn = document.getElementById('start-btn');
            startBtn.classList.remove('hidden', 'opacity-70', 'cursor-not-allowed');
            startBtn.disabled = false;
            document.getElementById('shutter-text').innerText = `ถ่ายรูป (1/3)`;
        }

        // --- ระบบอัปโหลดและแกลลอรี่ (อัปเดตให้รองรับ GitHub + API) ---
        function uploadImage() {
            if (!SCRIPT_URL || SCRIPT_URL.includes('ใส่_URL')) {
                alert("กรุณาตรวจสอบ SCRIPT_URL อีกครั้ง");
                return;
            }

            const statusEl = document.getElementById('upload-status');
            const actionBtns = document.getElementById('action-buttons');
            
            actionBtns.classList.add('hidden'); // ซ่อนปุ่มระหว่างส่ง
            actionBtns.classList.remove('flex');

            statusEl.innerText = "กำลังส่งรูปไปยังแกลลอรี่...";
            statusEl.className = "mt-6 text-lg font-semibold text-blue-600 text-center";
            
            const base64Data = canvas.toDataURL('image/jpeg', 0.85); // บีบอัด JPEG 85%

            // เปลี่ยนมาใช้ URLSearchParams เพื่อป้องกันปัญหาข้อมูลสูญหายและถูกบล็อกตอนเชื่อมต่อ Google
            const formData = new URLSearchParams();
            formData.append('action', 'savePhoto');
            formData.append('data', base64Data);

            // ส่งข้อมูลด้วย fetch (API) แทน google.script.run
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    statusEl.innerText = "✅ ส่งรูปสำเร็จแล้ว!";
                    statusEl.className = "mt-6 text-lg font-semibold text-green-600 text-center";
                    setTimeout(() => resetCapture(), 3000);
                } else {
                    statusEl.innerText = "❌ เกิดข้อผิดพลาดฝั่งเซิร์ฟเวอร์: " + data.error;
                    statusEl.className = "mt-6 text-lg font-semibold text-red-600 text-center";
                    // แสดงปุ่มใหม่เผื่อให้ส่งอีกรอบ
                    actionBtns.classList.remove('hidden');
                    actionBtns.classList.add('flex');
                }
            })
            .catch(error => {
                statusEl.innerText = "❌ เกิดปัญหาการเชื่อมต่อ: " + error.message;
                statusEl.className = "mt-6 text-lg font-semibold text-red-600 text-center";
                actionBtns.classList.remove('hidden');
                actionBtns.classList.add('flex');
            });
        }

        function loadGallery() {
            if (!SCRIPT_URL || SCRIPT_URL.includes('ใส่_URL')) return; // ป้องกันการ error หากยังไม่ตั้ง URL

            // ดึงข้อมูลแกลลอรี่ด้วย GET Request
            fetch(SCRIPT_URL + "?action=getGallery")
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('gallery-grid');
                grid.innerHTML = '';
                
                if(!data || data.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10">ยังไม่มีรูปภาพในระบบ</div>';
                    return;
                }

                data.forEach((row, index) => {
                    const date = new Date(row[0]).toLocaleTimeString('th-TH');
                    const url = row[1];
                    
                    const card = document.createElement('div');
                    card.className = "bg-white p-3 rounded-xl shadow-md border border-gray-200 hover:shadow-lg transition";
                    card.innerHTML = `
                        <div class="aspect-[105/148] w-full bg-gray-100 mb-3 overflow-hidden rounded border border-gray-300">
                            <img src="${url}" class="w-full h-full object-contain" loading="lazy">
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-500">${date}</span>
                            <button onclick="printPhoto('${url}')" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-full shadow">
                                <i class="fas fa-print"></i>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                console.error("Error fetching gallery:", error);
            });
        }

        function printPhoto(url) {
            const printImg = document.getElementById('print-image');
            printImg.src = url;
            
            // รอโหลดรูปเสร็จค่อยสั่งปริ้น
            printImg.onload = function() {
                window.print();
            }
        }
    </script>
</body>
</html>
